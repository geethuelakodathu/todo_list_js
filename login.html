<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign In - My Trip</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="fas fa-suitcase-rolling brand-icon"></i>
            My Trip
        </a>
    </div>
</nav>

<section class="auth-section">

   

    <div class="auth-bg-icon balloon">
        <i class="fas fa-hot-air-balloon"></i>
    </div>

    <div class="container">

        <div class="auth-card">

            <div class="row g-0">

                <div class="col-lg-5 auth-left">

                    <i class="fas fa-earth-americas auth-big-icon"></i>

                    <h2>Welcome Back</h2>

                    <p>
                        Continue your journey and discover amazing destinations around the world.
                    </p>

                </div>

                <div class="col-lg-7">

                    <div class="auth-form">

                        <h3>
                            <i class="fas fa-right-to-bracket"></i>
                            Sign In
                        </h3>

                        <form id="loginForm">

                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" class="form-control" id="loginEmail">
                                <small class="error" id="loginEmailError"></small>
                            </div>

                            <div class="mb-3">

                                <label>Password</label>

                                <div class="input-group">

                                    <input type="password"
                                           class="form-control"
                                           id="loginPassword">

                                    <button type="button"
                                            class="btn password-btn"
                                            onclick="togglePassword('loginPassword')">

                                        <i class="fas fa-eye"></i>

                                    </button>

                                </div>

                                <small class="error" id="loginPasswordError"></small>

                            </div>

                            <button class="btn-auth">
                                Sign In
                            </button>

                        </form>

                        <div class="switch-link">
                            Don't have an account?
                            <a href="/registration.html">Create Account</a>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<script src="js/script.js"></script>

</body>
</html>
