<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up - My Trip</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-suitcase-rolling brand-icon"></i>
                My Trip
            </a>
        </div>
    </nav>

    <section class="auth-section">

      

        <div class="auth-bg-icon balloon">
            <i class="fas fa-hot-air-balloon"></i>
        </div>

        <div class="container">

            <div class="auth-card">

                <div class="row g-0">

                    <div class="col-lg-5 auth-left">

                        <i class="fas fa-plane-departure auth-big-icon"></i>

                        <h2>Start Exploring</h2>

                        <p>
                            Create your account and unlock unforgettable adventures.
                        </p>

                    </div>

                    <div class="col-lg-7">

                        <div class="auth-form">

                            <h3>
                                <i class="fas fa-user-plus"></i>
                                Create Account
                            </h3>
<p class="" id="errorId"> </p>
                            <form id="signupForm">

                                <div class="row">

                                    <div class="col-md-6 mb-3">
                                        <label>Full Name</label>
                                        <input type="text" class="form-control" id="name">
                                        <small class="error" id="nameError"></small>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label>Email</label>
                                        <input type="email" class="form-control" id="email">
                                        <small class="error" id="emailError"></small>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label>Phone</label>
                                        <input type="text" class="form-control" id="phone">
                                        <small class="error" id="phoneError"></small>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label>City</label>
                                        <input type="text" class="form-control" id="city">
                                        <small class="error" id="cityError"></small>
                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label>Password</label>

                                        <div class="input-group">

                                            <input type="password" class="form-control" id="password">

                                            <button type="button" class="btn password-btn"
                                                onclick="togglePassword('password')">

                                                <i class="fas fa-eye"></i>

                                            </button>

                                        </div>

                                        <small class="error" id="passwordError"></small>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label>Confirm Password</label>

                                        <div class="input-group">

                                            <input type="password" class="form-control" id="confirmPassword">

                                            <button type="button" class="btn password-btn"
                                                onclick="togglePassword('confirmPassword')">

                                                <i class="fas fa-eye"></i>

                                            </button>

                                        </div>

                                        <small class="error" id="confirmPasswordError"></small>

                                    </div>

                                </div>

                                <button class="btn-auth">
                                    Create Account
                                </button>

                            </form>

                            <div class="switch-link">
                                Already have an account?
                                <a href="login.html">Sign In</a>
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="js/script.js"></script>

</body>

</html>
